<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TxWrap — Your Wallet, Wrapped.</title>
  <link rel="icon" type="image/x-icon" href="/favicon.ico">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Inter:wght@400;600;700;800;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.8/dist/cdn.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
  <style>
    :root { --ink:#0a0a0a; }
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family:'Inter',sans-serif; background:#EDE7DB; color:var(--ink); -webkit-font-smoothing:antialiased;
      background-image:radial-gradient(var(--ink) 1px, transparent 1px); background-size:22px 22px; }
    .display { font-family:'Archivo Black',sans-serif; letter-spacing:-.02em; line-height:.92; }
    .mono { font-family:'Space Mono',monospace; }
    .frame { border:5px solid var(--ink); box-shadow:16px 16px 0 var(--ink); }
    .card { background:#fff; color:var(--ink); border:3px solid var(--ink); box-shadow:6px 6px 0 var(--ink); }
    .badge { display:inline-block; background:var(--ink); color:#fff; font-weight:900; text-transform:uppercase;
      letter-spacing:.08em; padding:6px 14px; transform:rotate(-3deg); border:3px solid var(--ink); }
    .btn { border:3px solid var(--ink); box-shadow:5px 5px 0 var(--ink); font-weight:900; text-transform:uppercase;
      letter-spacing:.06em; transition:transform .06s, box-shadow .06s; cursor:pointer; }
    .btn:hover { transform:translate(-1px,-1px); box-shadow:6px 6px 0 var(--ink); }
    .btn:active { transform:translate(4px,4px); box-shadow:1px 1px 0 var(--ink); }
    .btn:disabled { opacity:.35; box-shadow:none; transform:none; cursor:not-allowed; }
    /* staggered reveal */
    @keyframes pop { from { opacity:0; transform:translateY(20px) scale(.95) rotate(-1.2deg); } to { opacity:1; transform:none; } }
    .reveal .pop { opacity:0; }
    .reveal.run .pop { animation:pop .52s cubic-bezier(.2,.9,.2,1) both; }
    .reveal.run .pop:nth-child(1){animation-delay:.04s}
    .reveal.run .pop:nth-child(2){animation-delay:.10s}
    .reveal.run .pop:nth-child(3){animation-delay:.16s}
    .reveal.run .pop:nth-child(4){animation-delay:.22s}
    .reveal.run .pop:nth-child(5){animation-delay:.28s}
    .reveal.run .pop:nth-child(6){animation-delay:.34s}
    .reveal.run .pop:nth-child(7){animation-delay:.40s}
    /* score bars */
    .bar-track { background:rgba(0,0,0,.10); border:3px solid var(--ink); height:30px; overflow:hidden; }
    .bar-fill { height:100%; width:0; transition:width 1s cubic-bezier(.2,.9,.2,1); }
    /* marquee */
    .marquee { overflow:hidden; white-space:nowrap; border-top:3px solid var(--ink); border-bottom:3px solid var(--ink); }
    .marquee > span { display:inline-block; animation:scroll 14s linear infinite; font-weight:900; text-transform:uppercase; letter-spacing:.1em; }
    @keyframes scroll { from { transform:translateX(0); } to { transform:translateX(-50%); } }
    @keyframes spin { to { transform:rotate(360deg); } }
    .spin { animation:spin .9s linear infinite; }
    @keyframes float { 0%,100%{transform:rotate(-3deg) translateY(0)} 50%{transform:rotate(-3deg) translateY(-6px)} }
    .float { animation:float 3s ease-in-out infinite; }
  </style>
</head>
<body>
  <div x-data="txwrap()" class="min-h-screen" :class="loading && 'flex items-center justify-center'">

    <!-- ===== LOADING ===== -->
    <template x-if="loading">
      <div class="flex flex-col items-center gap-6">
        <div class="w-16 h-16 border-[5px] border-[var(--ink)] border-t-[#FF2D8B] spin"></div>
        <p class="mono uppercase text-sm tracking-widest font-bold">Wrapping your wallet...</p>
      </div>
    </template>

    <!-- ===== LANDING ===== -->
    <template x-if="!loading && !wrapped">
      <div class="min-h-screen flex flex-col items-center justify-center gap-8 px-4 py-16">
        <div class="badge float text-sm">Spotify Wrapped, but for your wallet</div>
        <h1 class="display text-center" style="font-size:clamp(3.5rem,16vw,9rem)">TX<span style="color:#FF2D8B">WRAP</span></h1>
        <p class="mono uppercase tracking-[3px] text-sm font-bold -mt-4">Your Wallet, Wrapped.</p>

        <div class="grid grid-cols-1 sm:grid-cols-3 gap-4 max-w-2xl w-full mt-2">
          <div class="card p-4 -rotate-1"><p class="mono text-[11px] uppercase tracking-widest font-bold text-[#FF2D8B] mb-1">Archetype</p><p class="text-sm font-extrabold">AI wallet personality &amp; roast</p></div>
          <div class="card p-4 rotate-1"><p class="mono text-[11px] uppercase tracking-widest font-bold text-[#2B4BFF] mb-1">Scores</p><p class="text-sm font-extrabold">DeFi, Airdrop, Degen &amp; more</p></div>
          <div class="card p-4 -rotate-1"><p class="mono text-[11px] uppercase tracking-widest font-bold text-[#00A676] mb-1">Share</p><p class="text-sm font-extrabold">Save as image or share on X</p></div>
        </div>

        <div class="flex w-full max-w-[560px] frame bg-white mt-2">
          <input type="text" x-model="address" @keydown.enter="wrap()" placeholder="0x..." class="flex-1 px-5 py-5 border-none outline-none text-base mono bg-white text-[var(--ink)]">
          <button @click="wrap()" class="px-8 py-5 bg-[#FF5C00] text-white display text-lg border-l-[5px] border-[var(--ink)] hover:bg-[#e85218] active:translate-x-[2px]">WRAP</button>
        </div>
        <button @click="loadSample()" class="mono text-xs uppercase tracking-widest font-bold underline underline-offset-4 hover:text-[#FF2D8B]">or see a sample wrap →</button>
      </div>
    </template>

    <!-- ===== SLIDESHOW ===== -->
    <template x-if="wrapped && !loading">
      <div class="min-h-screen flex flex-col items-center justify-center px-4 py-8 gap-5">

        <div id="card" class="frame w-full max-w-[560px] relative overflow-hidden"
             :style="`background:${themes[slide].bg};color:${themes[slide].ink}`"
             @touchstart="touchStart($event)" @touchend="touchEnd($event)">

          <!-- progress ticks -->
          <div class="flex gap-1.5 px-6 pt-6">
            <template x-for="n in totalSlides" :key="n">
              <div class="h-2 flex-1 border-2 border-[var(--ink)] cursor-pointer" :style="`background:${(n-1)<=slide ? 'var(--ink)':'transparent'}`" @click="go(n-1)"></div>
            </template>
          </div>

          <div class="px-8 pb-10 pt-6 min-h-[560px] flex flex-col justify-center">

            <!-- 0: COVER -->
            <div x-show="slide===0" class="reveal" :class="slide===0&&'run'">
              <div class="flex flex-col items-center text-center gap-5">
                <div class="badge pop text-xs">Your <span x-text="year"></span> Wallet Wrapped</div>
                <h2 class="display pop" style="font-size:clamp(3rem,13vw,5.5rem)">YOUR YEAR<br><span class="hollow" :style="`-webkit-text-stroke:2px ${themes[slide].ink}`" style="color:transparent">ONCHAIN</span></h2>
                <div class="card pop mono px-4 py-2 text-sm break-all" x-text="shortAddr(data.address)"></div>
                <p class="pop mono text-xs uppercase tracking-widest font-bold opacity-70">X Layer · powered by TxWrap</p>
              </div>
            </div>

            <!-- 1: ARCHETYPE -->
            <div x-show="slide===1" class="reveal" :class="slide===1&&'run'">
              <div class="badge pop text-xs mb-6">Your Wallet Archetype</div>
              <h2 class="display pop mb-6" style="font-size:clamp(2.4rem,10vw,4.2rem)" x-text="data.personality.title"></h2>
              <div class="card pop p-5 text-lg font-bold leading-snug" x-text="data.personality.roast"></div>
            </div>

            <!-- 2: OVERVIEW -->
            <div x-show="slide===2" class="reveal" :class="slide===2&&'run'">
              <div class="badge pop text-xs mb-6">The Numbers</div>
              <div class="grid grid-cols-2 gap-3">
                <div class="card pop p-5"><p class="mono text-[11px] uppercase tracking-widest font-bold opacity-60 mb-1">Balance</p><p class="display" style="font-size:clamp(1.4rem,6vw,2rem);color:#C68A00"><span x-text="data.metrics.balanceEth"></span> <span class="text-sm" x-text="sym"></span></p></div>
                <div class="card pop p-5"><p class="mono text-[11px] uppercase tracking-widest font-bold opacity-60 mb-1">Transactions</p><p class="display" style="font-size:clamp(1.8rem,7vw,2.6rem);color:#2B4BFF" x-text="disp.totalTx.toLocaleString()"></p></div>
                <div class="card pop p-5"><p class="mono text-[11px] uppercase tracking-widest font-bold opacity-60 mb-1">Gas Burned</p><p class="display" style="font-size:clamp(1.4rem,6vw,2rem);color:#FF2D8B"><span x-text="data.metrics.gasBurnedEth"></span> <span class="text-sm" x-text="sym"></span></p></div>
                <div class="card pop p-5"><p class="mono text-[11px] uppercase tracking-widest font-bold opacity-60 mb-1">Swaps</p><p class="display" style="font-size:clamp(1.8rem,7vw,2.6rem);color:#00A676" x-text="disp.swaps.toLocaleString()"></p></div>
              </div>
            </div>

            <!-- 3: SCORES -->
            <div x-show="slide===3" class="reveal" :class="slide===3&&'run'">
              <div class="badge pop text-xs mb-6">Scorecard</div>
              <div class="flex flex-col gap-4">
                <template x-for="s in scoreData" :key="s.label">
                  <div class="pop">
                    <div class="flex justify-between items-end mb-1"><span class="mono text-sm font-bold uppercase" x-text="s.label"></span><span class="display text-2xl" x-text="s.value"></span></div>
                    <div class="bar-track"><div class="bar-fill" :style="`width:${slide===3 ? s.value : 0}%;background:${s.hex}`"></div></div>
                  </div>
                </template>
              </div>
            </div>

            <!-- 4: FUN FACTS -->
            <div x-show="slide===4" class="reveal" :class="slide===4&&'run'">
              <div class="badge pop text-xs mb-6">Fun Facts</div>
              <div class="flex flex-col gap-3">
                <template x-for="(fact,i) in data.personality.funFacts" :key="i">
                  <div class="card pop p-4 flex gap-3 items-start" :class="i%2? 'rotate-1':'-rotate-1'">
                    <span class="display text-2xl shrink-0" :style="`color:${['#FF2D8B','#2B4BFF','#00A676'][i%3]}`" x-text="'0'+(i+1)"></span>
                    <p class="text-sm font-bold leading-snug" x-text="fact"></p>
                  </div>
                </template>
              </div>
            </div>

            <!-- 5: HABITS -->
            <div x-show="slide===5" class="reveal" :class="slide===5&&'run'">
              <div class="badge pop text-xs mb-6">Trading Habits</div>
              <div class="grid grid-cols-2 gap-3 mb-3">
                <div class="card pop p-5"><p class="mono text-[11px] uppercase tracking-widest font-bold opacity-60 mb-1">Peak Hour</p><p class="display" style="font-size:clamp(1.6rem,6vw,2.2rem);color:#2B4BFF" x-text="peakHourLabel"></p></div>
                <div class="card pop p-5"><p class="mono text-[11px] uppercase tracking-widest font-bold opacity-60 mb-1">Streak</p><p class="display" style="font-size:clamp(1.6rem,6vw,2.2rem);color:#00A676"><span x-text="data.metrics.activityStreak"></span><span class="text-base"> days</span></p></div>
              </div>
              <div class="card pop p-4"><p class="mono text-[11px] uppercase tracking-widest font-bold opacity-60 mb-1">Top Frenemy</p><p class="mono text-sm font-bold break-all" x-text="data.metrics.topFrenemy"></p></div>
            </div>

            <!-- 6: VERDICT -->
            <div x-show="slide===6" class="reveal" :class="slide===6&&'run'">
              <div class="flex flex-col items-center text-center gap-6">
                <p class="pop display" style="font-size:4rem">⚡</p>
                <div class="card pop p-6 text-2xl font-black italic leading-snug" x-text="'&ldquo;'+data.personality.verdict+'&rdquo;'"></div>
                <p class="pop mono text-xs uppercase tracking-[3px] font-bold opacity-70">— TxWrap Verdict</p>
              </div>
            </div>

            <!-- 7: SUMMARY -->
            <div x-show="slide===7" class="reveal" :class="slide===7&&'run'">
              <div class="badge pop text-xs mb-5">In Summary</div>
              <p class="display pop mb-5" style="font-size:clamp(1.5rem,6vw,2.2rem)" x-text="data.metrics.sarcasticTitle"></p>
              <div class="grid grid-cols-4 gap-2 mb-6">
                <template x-for="s in scoreData" :key="s.label">
                  <div class="card pop p-2 text-center"><p class="mono text-[9px] uppercase font-bold opacity-60" x-text="s.label"></p><p class="display text-xl" :style="`color:${s.hex}`" x-text="s.value"></p></div>
                </template>
              </div>
              <button @click="shareX()" class="pop btn w-full py-4 bg-[var(--ink)] text-white text-sm">Share on X</button>
            </div>

          </div>

          <div class="marquee" :style="`background:${themes[slide].ink};color:${themes[slide].bg}`">
            <span>TXWRAP · YOUR YEAR ONCHAIN · TXWRAP · YOUR YEAR ONCHAIN · TXWRAP · YOUR YEAR ONCHAIN · </span><span>TXWRAP · YOUR YEAR ONCHAIN · TXWRAP · YOUR YEAR ONCHAIN · TXWRAP · YOUR YEAR ONCHAIN · </span>
          </div>
        </div>

        <!-- controls -->
        <div class="w-full max-w-[560px] flex justify-between items-center gap-3 flex-wrap">
          <div class="flex items-center gap-3">
            <button @click="prev()" :disabled="slide===0" class="btn w-12 h-12 bg-white display text-xl flex items-center justify-center">←</button>
            <span class="display text-lg"><span x-text="slide+1"></span><span class="opacity-40">/</span><span x-text="totalSlides"></span></span>
            <button @click="next()" :disabled="slide===totalSlides-1" class="btn w-12 h-12 bg-white display text-xl flex items-center justify-center">→</button>
          </div>
          <div class="flex gap-2">
            <button @click="saveImage()" class="btn px-4 py-3 bg-white text-xs">Save Image</button>
            <button @click="reset()" class="btn px-4 py-3 bg-white text-xs">New Wrap</button>
          </div>
        </div>
      </div>
    </template>
  </div>

  <script>
    function txwrap() {
      return {
        address: '',
        loading: false,
        wrapped: false,
        slide: 0,
        totalSlides: 8,
        year: new Date().getFullYear(),
        data: { address:'', metrics: null, personality: null },
        disp: { totalTx: 0, swaps: 0 },
        touchX: 0,
        themes: [
          { bg:'#FFD400', ink:'#0a0a0a' }, // cover
          { bg:'#FF2D8B', ink:'#0a0a0a' }, // archetype
          { bg:'#2B4BFF', ink:'#ffffff' }, // overview
          { bg:'#C6FF00', ink:'#0a0a0a' }, // scores
          { bg:'#FF5C00', ink:'#0a0a0a' }, // fun facts
          { bg:'#8B3DFF', ink:'#ffffff' }, // habits
          { bg:'#12E4B6', ink:'#0a0a0a' }, // verdict
          { bg:'#FFD400', ink:'#0a0a0a' }, // summary
        ],

        init() {
          this.$watch('slide', v => this.enter(v));
          window.addEventListener('keydown', e => {
            if (!this.wrapped) return;
            if (e.key === 'ArrowRight') this.next();
            if (e.key === 'ArrowLeft') this.prev();
          });
          const m = location.pathname.match(/\/wrap\/(0x[a-fA-F0-9]{40})/);
          const addr = m ? m[1] : new URLSearchParams(location.search).get('address');
          if (addr) { this.address = addr; this.$nextTick(() => this.wrap()); }
        },

        get sym() { return this.data.metrics?.tokenSymbol || 'OKB'; },

        get scoreData() {
          const m = this.data.metrics;
          if (!m) return [];
          return [
            { label: 'DeFi', value: m.defiScore, hex: '#2B4BFF' },
            { label: 'Airdrop', value: m.airdropScore, hex: '#8B3DFF' },
            { label: 'Degen', value: m.degenScore, hex: '#FF2D8B' },
            { label: 'Whale', value: m.whaleometer, hex: '#C68A00' },
          ];
        },

        get peakHourLabel() {
          const h = this.data.metrics?.peakHour;
          if (h === undefined || h === null) return '';
          const ampm = h >= 12 ? 'PM' : 'AM';
          return (h % 12 || 12) + ':00 ' + ampm;
        },

        shortAddr(a) { return (!a || a.length < 16) ? (a || '') : a.slice(0, 10) + '...' + a.slice(-6); },

        enter(v) {
          if (v === 2) {
            this.countUp('totalTx', this.data.metrics.totalTx);
            this.countUp('swaps', this.data.metrics.swapCount);
          }
        },

        countUp(key, target) {
          const start = performance.now(), dur = 900;
          this.disp[key] = 0;
          const step = now => {
            const t = Math.min(1, (now - start) / dur);
            this.disp[key] = Math.round((1 - Math.pow(1 - t, 3)) * target);
            if (t < 1) requestAnimationFrame(step);
          };
          requestAnimationFrame(step);
        },

        go(n) { this.slide = n; },
        prev() { if (this.slide > 0) this.slide--; },
        next() { if (this.slide < this.totalSlides - 1) this.slide++; },

        touchStart(e) { this.touchX = e.changedTouches[0].clientX; },
        touchEnd(e) {
          const dx = e.changedTouches[0].clientX - this.touchX;
          if (dx < -50) this.next();
          if (dx > 50) this.prev();
        },

        async wrap() {
          const addr = this.address.trim();
          if (!addr || !addr.startsWith('0x') || addr.length !== 42) {
            alert('Please enter a valid 0x wallet address (42 characters)');
            return;
          }
          this.loading = true;
          try {
            const res = await fetch('/api/txwrap', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ address: addr }),
            });
            if (!res.ok) { const err = await res.json(); throw new Error(err.error || 'Request failed'); }
            const json = await res.json();
            this.data = json.data;
            this.slide = 0;
            this.wrapped = true;
            this.loading = false;
          } catch (e) {
            this.loading = false;
            alert('Error: ' + e.message);
          }
        },

        loadSample() {
          this.data = {
            address: '0x69c236e021f5775b0d0328ded5eac708e3b869df',
            metrics: {
              totalTx: 847, tokenSymbol: 'OKB', balanceEth: '12.4821', balanceUsd: '624.10',
              gasBurnedEth: '3.2140', gasBurnedUsd: '160.70', swapCount: 213, defiScore: 78,
              airdropScore: 82, degenScore: 91, diamondHandsDays: 14, whaleometer: 67,
              uniqueProtocols: 19, topFrenemy: '0x8f3a9c2b1d4e5f6a7b8c9d0e1f2a3b4c5d6e7f80',
              peakHour: 2, activityStreak: 23, archetype: 'The 2AM Degen',
              sarcasticTitle: 'Serial Approver',
            },
            personality: {
              title: '🎰 The 2AM Degen',
              roast: 'You made 213 swaps and 61% were past midnight. Sleep is a protocol you never interacted with.',
              funFacts: [
                'You burned 3.21 OKB on gas — roughly 40 coffees you will never get back.',
                '19 protocols touched, maybe 3 remembered. Classic explorer energy.',
                'Peak trading hour: 2AM. We are not mad, just deeply concerned.',
              ],
              verdict: 'Certified degen. Mid-table of crypto, top-table of insomnia.',
            },
          };
          this.slide = 0;
          this.wrapped = true;
        },

        reset() { this.wrapped = false; this.slide = 0; this.address = ''; },

        async saveImage() {
          const el = document.getElementById('card');
          if (!el) return;
          try {
            const canvas = await html2canvas(el, {
              scale: 2, useCORS: true, logging: false,
              onclone: (doc) => {
                // html2canvas re-triggers CSS animations in the clone, capturing
                // reveal elements at their opacity:0 start frame. Freeze them.
                doc.querySelectorAll('.pop').forEach(n => {
                  n.style.opacity = '1';
                  n.style.transform = 'none';
                  n.style.animation = 'none';
                });
                doc.querySelectorAll('.marquee > span').forEach(n => { n.style.animation = 'none'; });
                // -webkit-text-stroke is unsupported by html2canvas; render solid.
                doc.querySelectorAll('.hollow').forEach(n => {
                  n.style.color = 'currentColor';
                  n.style.webkitTextStroke = '0';
                });
              },
            });
            const link = document.createElement('a');
            link.download = 'txwrap-' + Date.now() + '.png';
            link.href = canvas.toDataURL('image/png');
            link.click();
          } catch (e) { alert('Failed to generate image: ' + e.message); }
        },

        shareX() {
          const url = window.location.href;
          const text = '📊 Check out my wallet wrap! 🎰\n\n' + url + '\n\n#OKXAI #TxWrap';
          window.open('https://x.com/intent/tweet?text=' + encodeURIComponent(text), '_blank', 'width=600,height=400');
        },
      };
    }
  </script>
</body>
</html>
