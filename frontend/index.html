<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TxWrap — Your Wallet, Wrapped.</title>
  <link rel="icon" type="image/x-icon" href="/favicon.ico">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Inter:wght@400;600;700;800;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.8/dist/cdn.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
  <style>
    :root { --ink:#0a0a0a; }
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family:'Inter',sans-serif; background:#EDE7DB; color:var(--ink); -webkit-font-smoothing:antialiased;
      background-image:radial-gradient(var(--ink) 1px, transparent 1px); background-size:22px 22px; }
    .display { font-family:'Archivo Black',sans-serif; letter-spacing:-.02em; line-height:.92; }
    .mono { font-family:'Space Mono',monospace; }
    .frame { border:5px solid var(--ink); box-shadow:16px 16px 0 var(--ink); }
    .card { background:#fff; color:var(--ink); border:3px solid var(--ink); box-shadow:6px 6px 0 var(--ink); }
    .badge { display:inline-block; background:var(--ink); color:#fff; font-weight:900; text-transform:uppercase;
      letter-spacing:.08em; padding:6px 14px; transform:rotate(-3deg); border:3px solid var(--ink); }
    .btn { border:3px solid var(--ink); box-shadow:5px 5px 0 var(--ink); font-weight:900; text-transform:uppercase;
      letter-spacing:.06em; transition:transform .06s, box-shadow .06s; cursor:pointer; }
    .btn:hover { transform:translate(-1px,-1px); box-shadow:6px 6px 0 var(--ink); }
    .btn:active { transform:translate(4px,4px); box-shadow:1px 1px 0 var(--ink); }
    .btn:disabled { opacity:.35; box-shadow:none; transform:none; cursor:not-allowed; }
    /* staggered reveal */
    @keyframes pop { from { opacity:0; transform:translateY(20px) scale(.95) rotate(-1.2deg); } to { opacity:1; transform:none; } }
    .reveal .pop { opacity:0; }
    .reveal.run .pop { animation:pop .52s cubic-bezier(.2,.9,.2,1) both; }
    .reveal.run .pop:nth-child(1){animation-delay:.04s}
    .reveal.run .pop:nth-child(2){animation-delay:.10s}
    .reveal.run .pop:nth-child(3){animation-delay:.16s}
    .reveal.run .pop:nth-child(4){animation-delay:.22s}
    .reveal.run .pop:nth-child(5){animation-delay:.28s}
    .reveal.run .pop:nth-child(6){animation-delay:.34s}
    .reveal.run .pop:nth-child(7){animation-delay:.40s}
    /* score bars */
    .bar-track { background:rgba(0,0,0,.10); border:3px solid var(--ink); height:30px; overflow:hidden; }
    .bar-fill { height:100%; width:0; transition:width 1s cubic-bezier(.2,.9,.2,1); }
    /* decorative theme backgrounds (behind content, html2canvas-safe shapes) */
    .deco { position:absolute; inset:0; pointer-events:none; overflow:hidden; color:rgba(0,0,0,.07); z-index:0; }
    .deco.inkw { color:rgba(255,255,255,.12); }
    .deco::before, .deco::after { content:""; position:absolute; }
    .deco-0::before { width:340px; height:340px; border:26px solid currentColor; border-radius:50%; top:-120px; right:-120px; }
    .deco-0::after { width:180px; height:180px; border:18px solid currentColor; border-radius:50%; bottom:-60px; left:-60px; }
    .deco-1::before { inset:0; background:repeating-linear-gradient(-45deg, currentColor 0 3px, transparent 3px 28px); }
    .deco-2::before { inset:0; background:radial-gradient(currentColor 2.5px, transparent 3px); background-size:28px 28px; }
    .deco-3::before { width:260px; height:260px; border:20px solid currentColor; transform:rotate(12deg); top:-90px; left:-90px; }
    .deco-3::after { width:150px; height:150px; border:14px solid currentColor; transform:rotate(-18deg); bottom:-50px; right:-40px; }
    .deco-4::before { inset:0; background:repeating-linear-gradient(0deg, currentColor 0 3px, transparent 3px 32px); }
    .deco-5::before { width:240px; height:34px; background:currentColor; top:64px; right:-70px; transform:rotate(-8deg); }
    .deco-5::after { width:240px; height:34px; background:currentColor; bottom:84px; left:-80px; transform:rotate(6deg); }
    .deco-6::before { width:300px; height:300px; border:22px solid currentColor; border-radius:50%; top:-110px; left:-110px; }
    .deco-6::after { width:160px; height:160px; border:14px solid currentColor; border-radius:50%; bottom:-50px; right:-50px; }
    .deco-7::before { inset:0; background:repeating-linear-gradient(90deg, currentColor 0 22px, transparent 22px 64px); opacity:.35; }
    .deco-8::before { inset:0; background:repeating-linear-gradient(45deg, currentColor 0 3px, transparent 3px 36px); }
    /* marquee */
    .marquee { overflow:hidden; white-space:nowrap; border-top:3px solid var(--ink); border-bottom:3px solid var(--ink); }
    .marquee > span { display:inline-block; animation:scroll 14s linear infinite; font-weight:900; text-transform:uppercase; letter-spacing:.1em; }
    @keyframes scroll { from { transform:translateX(0); } to { transform:translateX(-50%); } }
    @keyframes spin { to { transform:rotate(360deg); } }
    .spin { animation:spin .9s linear infinite; }
    @keyframes float { 0%,100%{transform:rotate(-3deg) translateY(0)} 50%{transform:rotate(-3deg) translateY(-6px)} }
    .float { animation:float 3s ease-in-out infinite; }

    /* ---- landing page ---- */
    .sec { border-bottom:5px solid var(--ink); padding:96px 24px; position:relative; overflow:hidden; }
    .wrapx { max-width:1080px; margin:0 auto; position:relative; z-index:1; }
    .eyebrow { display:inline-block; background:var(--ink); color:#fff; font-family:'Space Mono',monospace;
      font-size:12px; font-weight:700; text-transform:uppercase; letter-spacing:.2em; padding:7px 14px;
      border:3px solid var(--ink); transform:rotate(-1.5deg); margin-bottom:28px; }
    .h2 { font-family:'Archivo Black',sans-serif; letter-spacing:-.03em; line-height:.94;
      font-size:clamp(2.2rem,6.5vw,4.4rem); margin-bottom:20px; }
    .lede { font-size:clamp(1rem,2vw,1.25rem); font-weight:600; max-width:60ch; line-height:1.5; }

    /* scroll reveal */
    .rv { opacity:0; transform:translateY(34px) rotate(-.6deg); }
    .rv.seen { animation:rvin .62s cubic-bezier(.2,.9,.2,1) both; }
    @keyframes rvin { to { opacity:1; transform:none; } }
    .rv.seen:nth-child(2){animation-delay:.06s}
    .rv.seen:nth-child(3){animation-delay:.12s}
    .rv.seen:nth-child(4){animation-delay:.18s}
    .rv.seen:nth-child(5){animation-delay:.24s}
    .rv.seen:nth-child(6){animation-delay:.30s}

    /* big cta */
    .cta { display:inline-flex; align-items:center; gap:14px; background:#FF5C00; color:#fff;
      font-family:'Archivo Black',sans-serif; font-size:clamp(1.1rem,2.6vw,1.7rem);
      padding:22px 40px; border:5px solid var(--ink); box-shadow:12px 12px 0 var(--ink);
      text-decoration:none; transition:transform .08s, box-shadow .08s; }
    .cta:hover { transform:translate(-3px,-3px); box-shadow:15px 15px 0 var(--ink); }
    .cta:active { transform:translate(6px,6px); box-shadow:2px 2px 0 var(--ink); }

    /* ticker */
    .tick { background:var(--ink); color:#FFD400; overflow:hidden; white-space:nowrap;
      border-top:5px solid var(--ink); border-bottom:5px solid var(--ink); }
    .tick span { display:inline-block; padding:14px 0; font-family:'Archivo Black',sans-serif;
      font-size:20px; letter-spacing:.06em; animation:scroll 22s linear infinite; }

    /* signal chip grid */
    .sig { border:3px solid var(--ink); background:#fff; box-shadow:5px 5px 0 var(--ink);
      padding:14px 16px; transition:transform .1s; }
    .sig:hover { transform:translate(-2px,-2px) rotate(-1deg); box-shadow:8px 8px 0 var(--ink); }
    .sig code { font-family:'Space Mono',monospace; font-weight:700; font-size:13px; }

    /* code block */
    .codeblk { background:var(--ink); color:#C6FF00; border:4px solid var(--ink);
      box-shadow:9px 9px 0 rgba(0,0,0,.25); font-family:'Space Mono',monospace; font-size:12.5px;
      line-height:1.65; padding:22px; overflow-x:auto; white-space:pre; }
    .codeblk .k { color:#FF2D8B; } .codeblk .s { color:#FFD400; } .codeblk .c { color:#8a8a8a; }

    /* step rail */
    .step { display:flex; gap:20px; align-items:flex-start; }
    .step .n { font-family:'Archivo Black',sans-serif; font-size:2.4rem; line-height:1;
      -webkit-text-stroke:2px var(--ink); color:transparent; flex-shrink:0; width:64px; }
  </style>
</head>
<body>
  <div x-data="txwrap()" class="min-h-screen" :class="loading && 'flex items-center justify-center'">

    <!-- ===== LOADING ===== -->
    <template x-if="loading">
      <div class="flex flex-col items-center gap-6">
        <div class="w-16 h-16 border-[5px] border-[var(--ink)] border-t-[#FF2D8B] spin"></div>
        <p class="mono uppercase text-sm tracking-widest font-bold">Wrapping your wallet...</p>
      </div>
    </template>

    <!-- ===== LANDING ===== -->
    <template x-if="!loading && !wrapped">
      <div x-init="initReveal()">

        <!-- 1 · HERO -->
        <section class="sec" style="background:#FFD400;padding-top:72px">
          <div class="deco deco-0"></div>
          <div class="wrapx flex flex-col items-center text-center">
            <div class="badge float text-sm rv">On-chain wallet intelligence for agents</div>
            <h1 class="display rv" style="font-size:clamp(3.5rem,16vw,10rem);margin:10px 0">TX<span style="color:#FF2D8B">WRAP</span></h1>
            <p class="lede rv" style="margin-bottom:34px">
              Your agent keeps hitting addresses it knows nothing about.
              TxWrap answers <em>“who is this wallet, and should I act on it?”</em>
              — as structured data it can compose, not a webpage it has to scrape.
            </p>
            <a href="https://www.okx.ai/agents/4938" target="_blank" rel="noopener" class="cta rv">
              Try TxWrap on OKX.AI <span>→</span>
            </a>
            <button @click="scrollToWrap()" class="rv mono text-xs uppercase tracking-widest font-bold underline underline-offset-4 hover:text-[#FF2D8B]" style="margin-top:22px">
              or wrap your own wallet ↓
            </button>
            <div class="rv mono text-[11px] uppercase tracking-widest font-bold opacity-60" style="margin-top:14px">
              Agent&nbsp;ID&nbsp;#4938 · X&nbsp;Layer · 0.05 USDT0 per call
            </div>

            <!-- live usage counters (real, from /api/stats) -->
            <div x-show="statsReady" x-transition.duration.500ms class="grid grid-cols-1 sm:grid-cols-3 gap-3 w-full" style="max-width:720px;margin-top:44px">
              <div class="card p-4 -rotate-1">
                <p class="display" style="font-size:2rem;color:#2B4BFF" x-text="ds.agentCalls.toLocaleString()"></p>
                <p class="mono text-[10px] uppercase tracking-widest font-bold opacity-60 mt-1">Tool calls by agents</p>
              </div>
              <div class="card p-4 rotate-1">
                <p class="display" style="font-size:2rem;color:#FF2D8B" x-text="ds.wraps.toLocaleString()"></p>
                <p class="mono text-[10px] uppercase tracking-widest font-bold opacity-60 mt-1">Wallets wrapped by people</p>
              </div>
              <div class="card p-4 -rotate-1">
                <p class="display" style="font-size:2rem;color:#00A676" x-text="ds.uniqueWallets.toLocaleString()"></p>
                <p class="mono text-[10px] uppercase tracking-widest font-bold opacity-60 mt-1">Unique addresses profiled</p>
              </div>
            </div>
          </div>
        </section>

        <!-- ticker -->
        <div class="tick">
          <span>SCREEN COUNTERPARTIES · DETECT SYBILS · RANK WALLETS · PROFILE ANY ADDRESS · SCREEN COUNTERPARTIES · DETECT SYBILS · RANK WALLETS · PROFILE ANY ADDRESS · </span><span>SCREEN COUNTERPARTIES · DETECT SYBILS · RANK WALLETS · PROFILE ANY ADDRESS · SCREEN COUNTERPARTIES · DETECT SYBILS · RANK WALLETS · PROFILE ANY ADDRESS · </span>
        </div>

        <!-- 2 · PROBLEM -->
        <section class="sec" style="background:#FF2D8B">
          <div class="deco deco-1"></div>
          <div class="wrapx">
            <div class="eyebrow rv">The problem</div>
            <h2 class="h2 rv">AN ADDRESS IS<br>JUST 42 CHARACTERS.</h2>
            <p class="lede rv" style="margin-bottom:36px">
              An autonomous agent about to send funds, drop an airdrop, or trust a counterparty
              sees <code class="mono">0x8f3a…7f80</code> and nothing else. Block explorers are built
              for humans with eyes. Agents need a verdict they can justify.
            </p>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
              <div class="card rv p-5 -rotate-1"><p class="display text-2xl mb-1">Is it a bot?</p><p class="text-sm font-bold opacity-70">Timing regularity, volume, night-hour skew.</p></div>
              <div class="card rv p-5 rotate-1"><p class="display text-2xl mb-1">Is it farming?</p><p class="text-sm font-bold opacity-70">Dust patterns, approval spam, wallet age.</p></div>
              <div class="card rv p-5 -rotate-1"><p class="display text-2xl mb-1">Is it real?</p><p class="text-sm font-bold opacity-70">Portfolio, net worth, cross-chain history.</p></div>
            </div>
          </div>
        </section>

        <!-- 3 · WHAT YOU GET -->
        <section class="sec" style="background:#2B4BFF;color:#fff">
          <div class="deco deco-6 inkw"></div>
          <div class="wrapx">
            <div class="eyebrow rv" style="background:#fff;color:var(--ink)">What comes back</div>
            <h2 class="h2 rv">14 SIGNALS.<br>ONE VERDICT.<br>ALWAYS WITH EVIDENCE.</h2>
            <p class="lede rv" style="margin-bottom:40px">
              Every result carries <code class="mono">archetypeConfidence</code> and an
              <code class="mono">evidence</code> block — how many transactions were analyzed,
              the window, and an explicit caveat. Never a black box.
            </p>
            <div class="grid grid-cols-2 md:grid-cols-4 gap-3">
              <template x-for="s in signalList" :key="s">
                <div class="sig rv text-[#0a0a0a]"><code x-text="s"></code></div>
              </template>
            </div>
          </div>
        </section>

        <!-- 4 · TOOLS -->
        <section class="sec" style="background:#C6FF00">
          <div class="deco deco-8"></div>
          <div class="wrapx">
            <div class="eyebrow rv">Seven MCP tools</div>
            <h2 class="h2 rv">CALL IT LIKE<br>ANY OTHER TOOL.</h2>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4" style="margin-top:36px">
              <template x-for="t in tools" :key="t.name">
                <div class="card rv p-6" :class="t.tilt">
                  <p class="mono text-sm font-bold" :style="`color:${t.hex}`" x-text="t.name + '()'"></p>
                  <p class="display text-xl mt-1 mb-2" x-text="t.title"></p>
                  <p class="text-sm font-bold opacity-70 leading-snug" x-text="t.desc"></p>
                </div>
              </template>
            </div>
          </div>
        </section>

        <!-- 5 · PRICING -->
        <section class="sec" style="background:#FF5C00">
          <div class="deco deco-4"></div>
          <div class="wrapx">
            <div class="eyebrow rv">Pay per call · x402 v2</div>
            <h2 class="h2 rv">0.05 USDT0.<br>NO KEY. NO GAS.</h2>
            <p class="lede rv" style="margin-bottom:32px">
              Discovery is free forever — <code class="mono">initialize</code> and
              <code class="mono">tools/list</code> never cost a cent. Each IP gets 20 free calls a day.
              Past that, the server answers <strong>HTTP&nbsp;402</strong> and the OKX facilitator
              settles the transfer on-chain. This server never touches a private key.
            </p>
            <div class="codeblk rv"><span class="c">// decoded PAYMENT-REQUIRED header</span>
{
  <span class="k">"x402Version"</span>: 2,
  <span class="k">"accepts"</span>: [{
    <span class="k">"scheme"</span>:  <span class="s">"exact"</span>,
    <span class="k">"network"</span>: <span class="s">"eip155:196"</span>,     <span class="c">// X Layer</span>
    <span class="k">"amount"</span>:  <span class="s">"50000"</span>,          <span class="c">// 0.05 USDT0</span>
    <span class="k">"asset"</span>:   <span class="s">"0x779ded0c…3736"</span>
  }]
}</div>
          </div>
        </section>

        <!-- 6 · HOW IT WORKS -->
        <section class="sec" style="background:#8B3DFF;color:#fff">
          <div class="deco deco-3 inkw"></div>
          <div class="wrapx">
            <div class="eyebrow rv" style="background:#fff;color:var(--ink)">Under the hood</div>
            <h2 class="h2 rv">SEVEN FETCHES.<br>ZERO GUESSES.</h2>
            <div class="flex flex-col gap-7" style="margin-top:40px">
              <template x-for="(st,i) in steps" :key="i">
                <div class="step rv">
                  <div class="n" style="-webkit-text-stroke:2px #fff" x-text="'0'+(i+1)"></div>
                  <div>
                    <p class="display text-2xl mb-1" x-text="st.t"></p>
                    <p class="text-sm font-bold opacity-80 leading-relaxed max-w-[62ch]" x-text="st.d"></p>
                  </div>
                </div>
              </template>
            </div>
          </div>
        </section>

        <!-- 7 · HONESTY -->
        <section class="sec" style="background:#12E4B6">
          <div class="deco deco-2"></div>
          <div class="wrapx">
            <div class="eyebrow rv">Things we refuse to do</div>
            <h2 class="h2 rv">AGENTS ACT ON THIS.<br>SO WE DON'T LIE.</h2>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4" style="margin-top:32px">
              <template x-for="h in honesty" :key="h.t">
                <div class="card rv p-5">
                  <p class="display text-lg mb-1" x-text="h.t"></p>
                  <p class="text-sm font-bold opacity-70 leading-snug" x-text="h.d"></p>
                </div>
              </template>
            </div>
          </div>
        </section>

        <!-- 8 · HUMAN LAYER -->
        <section id="wrap" class="sec" style="background:#EDE7DB">
          <div class="deco deco-7"></div>
          <div class="wrapx text-center">
            <div class="eyebrow rv">Bonus layer</div>
            <h2 class="h2 rv">AND YES —<br>IT ROASTS YOU.</h2>
            <p class="lede rv" style="margin:0 auto 32px">
              Ask for <code class="mono">roast: true</code> and the agent gets a shareable “Wrapped”
              slideshow to hand back to its human. Archetype, scores, portfolio, and a verdict
              nobody asked for.
            </p>

            <div class="rv flex w-full frame bg-white" style="max-width:560px;margin:0 auto">
              <input type="text" x-model="address" @keydown.enter="wrap()" placeholder="0x..."
                     class="flex-1 px-5 py-5 border-none outline-none text-base mono bg-white text-[var(--ink)]">
              <button @click="wrap()" class="px-8 py-5 bg-[#FF5C00] text-white display text-lg border-l-[5px] border-[var(--ink)] hover:bg-[#e85218] active:translate-x-[2px]">WRAP</button>
            </div>
            <button @click="loadSample()" class="rv mono text-xs uppercase tracking-widest font-bold underline underline-offset-4 hover:text-[#FF2D8B]" style="margin-top:20px">
              or see a sample wrap
            </button>
          </div>
        </section>

        <!-- 9 · FINAL CTA -->
        <section class="sec" style="background:#FFD400;border-bottom:none">
          <div class="deco deco-0"></div>
          <div class="wrapx flex flex-col items-center text-center">
            <h2 class="h2 rv" style="font-size:clamp(2.4rem,8vw,5.5rem)">GIVE YOUR AGENT<br>A SECOND OPINION.</h2>
            <a href="https://www.okx.ai/agents/4938" target="_blank" rel="noopener" class="cta rv" style="margin-top:20px">
              Try TxWrap on OKX.AI <span>→</span>
            </a>
            <div class="rv mono text-[11px] uppercase tracking-widest font-bold opacity-60" style="margin-top:26px">
              MCP endpoint · txwrap.my.id/mcp
            </div>
          </div>
        </section>

      </div>
    </template>

    <!-- ===== SLIDESHOW ===== -->
    <template x-if="wrapped && !loading">
      <div class="min-h-screen flex flex-col items-center justify-center px-4 py-8 gap-5">

        <div id="card" class="frame w-full max-w-[560px] relative overflow-hidden"
             :style="`background:${themes[slide].bg};color:${themes[slide].ink};transition:background .45s ease`"
             @touchstart="touchStart($event)" @touchend="touchEnd($event)">

          <!-- decorative theme background -->
          <div class="deco" :class="['deco-'+slide, themes[slide].ink==='#ffffff' ? 'inkw' : '']"></div>

          <!-- progress ticks -->
          <div class="relative z-[1] flex gap-1.5 px-6 pt-6">
            <template x-for="n in totalSlides" :key="n">
              <div class="h-2 flex-1 border-2 border-[var(--ink)] cursor-pointer" :style="`background:${(n-1)<=slide ? 'var(--ink)':'transparent'}`" @click="go(n-1)"></div>
            </template>
          </div>

          <div class="relative z-[1] px-8 pb-10 pt-6 min-h-[560px] flex flex-col justify-center">

            <!-- 0: COVER -->
            <div x-show="slide===0" class="reveal" :class="slide===0&&'run'">
              <div class="flex flex-col items-center text-center gap-5">
                <div class="badge pop text-xs">Your <span x-text="year"></span> Wallet Wrapped</div>
                <h2 class="display pop" style="font-size:clamp(3rem,13vw,5.5rem)">YOUR YEAR<br><span class="hollow" :style="`-webkit-text-stroke:2px ${themes[slide].ink}`" style="color:transparent">ONCHAIN</span></h2>
                <div class="card pop mono px-4 py-2 text-sm break-all" x-text="shortAddr(data.address)"></div>
                <p class="pop mono text-xs uppercase tracking-widest font-bold opacity-70">X Layer · powered by TxWrap</p>
              </div>
            </div>

            <!-- 1: ARCHETYPE -->
            <div x-show="slide===1" class="reveal" :class="slide===1&&'run'">
              <div class="flex items-center gap-3 flex-wrap mb-6">
                <div class="badge pop text-xs">Your Wallet Archetype</div>
                <div class="badge pop text-xs" style="background:#fff;color:var(--ink);transform:rotate(3deg)" x-text="data.metrics.rarity + ' Rank'"></div>
                <div class="badge pop text-xs" x-show="data.metrics.percentile" style="background:#0a0a0a;color:#fff;transform:rotate(-2deg)" x-text="'Top ' + (data.metrics.percentile?.topPercent ?? '') + '%'"></div>
              </div>
              <h2 class="display pop mb-6" style="font-size:clamp(2.4rem,10vw,4.2rem)" x-text="data.personality.title"></h2>
              <div class="card pop p-5 text-lg font-bold leading-snug" x-text="data.personality.roast"></div>

  <script>
    function txwrap() {
      return {
        address: '',
        loading: false,
        wrapped: false,
        slide: 0,
        totalSlides: 9,
        year: new Date().getFullYear(),
        data: { address:'', metrics: null, personality: null },
        disp: { totalTx: 0, swaps: 0 },
        touchX: 0,
        themes: [
          { bg:'#FFD400', ink:'#0a0a0a' }, // cover
          { bg:'#FF2D8B', ink:'#0a0a0a' }, // archetype
          { bg:'#2B4BFF', ink:'#ffffff' }, // overview
          { bg:'#12E4B6', ink:'#0a0a0a' }, // portfolio
          { bg:'#C6FF00', ink:'#0a0a0a' }, // scores
          { bg:'#FF5C00', ink:'#0a0a0a' }, // fun facts
          { bg:'#8B3DFF', ink:'#ffffff' }, // habits
          { bg:'#F3EDE2', ink:'#0a0a0a' }, // verdict
          { bg:'#FFD400', ink:'#0a0a0a' }, // summary
        ],

        // ---- live usage counters ----
        statsReady: false,
        ds: { wraps: 0, agentCalls: 0, uniqueWallets: 0 },

        async loadStats() {
          try {
            const res = await fetch('/api/stats');
            if (!res.ok) return;
            const s = await res.json();
            // Only show the strip once there is something real to show.
            if (!s.wraps && !s.agentCalls) return;
            this.statsReady = true;
            this.$nextTick(() => {
              Object.keys(this.ds).forEach(k => this.tween('ds', k, s[k] || 0));
            });
          } catch { /* counters are decoration; never block the page */ }
        },

        tween(obj, key, target) {
          const start = performance.now(), dur = 1100;
          const step = now => {
            const t = Math.min(1, (now - start) / dur);
            this[obj][key] = Math.round((1 - Math.pow(1 - t, 3)) * target);
            if (t < 1) requestAnimationFrame(step);
          };
          requestAnimationFrame(step);
        },

        // ---- landing page content ----
        signalList: [
          'nightOwl', 'approvalHeavy', 'likelyBot', 'dustPattern',
          'highSwapActivity', 'newWallet', 'dormant', 'whale',
          'diversifiedPortfolio', 'stablecoinHeavy', 'crossChainUser',
          'nftCollector', 'contractHeavy', 'reciprocalFlow',
        ],
        tools: [
          { name: 'profile_wallet', title: 'The full picture', hex: '#2B4BFF', tilt: '-rotate-1',
            desc: 'Archetype with confidence, activity breakdown, token portfolio, net worth, scores, signals, top counterparty, evidence.' },
          { name: 'screen_wallet', title: 'Risk, fast', hex: '#FF2D8B', tilt: 'rotate-1',
            desc: 'Coarse risk level plus the flags behind it: bot-like, dust-farming, approval-heavy, dormant, brand new.' },
          { name: 'compare_wallets', title: 'Rank a shortlist', hex: '#00A676', tilt: 'rotate-1',
            desc: 'Two to five addresses, side by side. Pick the safest counterparty or spot the farmer in the set.' },
          { name: 'classify_wallet', title: 'Cheap check', hex: '#C68A00', tilt: '-rotate-1',
            desc: 'Just the archetype, confidence, rarity tier and active signals. For when you do not need the whole profile.' },
          { name: 'find_sybils', title: 'Spot the farm', hex: '#8B3DFF', tilt: 'rotate-1',
            desc: 'Screen 3–20 wallets for coordination: shared counterparties, shared funder, correlated timing. Clusters the sybils before you airdrop.' },
          { name: 'screen_wallets', title: 'Vet the allowlist', hex: '#FF5C00', tilt: '-rotate-1',
            desc: 'Up to 20 wallets, one call: risk, verdict, momentum per wallet. Light mode — cheap enough to run on the whole list.' },
          { name: 'get_quota', title: 'Budget first — free', hex: '#00A676', tilt: 'rotate-1',
            desc: 'Remaining free calls today plus live x402 pricing. Never counts against the quota, so agents can meter before they spend.' },
        ],
        steps: [
          { t: 'Fetch, in parallel', d: 'Seven X Layer Data API endpoints at once: balances, native transactions, ERC-20 holdings, NFT count, token transfer flows, internal contract calls, and cross-chain hops. Any supplementary endpoint may fail without taking the profile down.' },
          { t: 'Classify every transaction', d: 'The 4-byte method selector is chain-agnostic, so each transaction resolves to swap, approve, transfer, native send, or other contract call. No guessing.' },
          { t: 'Score, deterministically', d: 'The metrics engine is pure math. Archetype, scores, and all 14 signals fall out of thresholds you can read in the source.' },
          { t: 'Attach the evidence', d: 'Confidence scales with sample size and how decisively the wallet cleared a threshold — capped below certainty, because a recent-activity window can never prove one.' },
          { t: 'Roast, optionally', d: 'The AI layer only writes the human summary. It never touches a number.' },
        ],
        honesty: [
          { t: 'No fabricated percentiles', d: 'A "top X%" only appears once enough wallets have been profiled to mean it, and it is measured against wallets TxWrap has profiled — never claimed against all of X Layer.' },
          { t: 'Confidence is capped at 0.95', d: 'A recent-activity window cannot justify certainty, so we never claim it.' },
          { t: 'No guessed protocol names', d: 'Unknown addresses render as clean short hex instead of a plausible-looking lie.' },
          { t: 'The fee matches reality', d: 'A paid endpoint must actually settle. We charge 0.05 because x402 settlement genuinely works.' },
        ],

        initReveal() {
          this.loadStats();
          this.$nextTick(() => {
            const io = new IntersectionObserver((entries) => {
              entries.forEach(e => {
                if (e.isIntersecting) { e.target.classList.add('seen'); io.unobserve(e.target); }
              });
            }, { threshold: 0.12, rootMargin: '0px 0px -8% 0px' });
            document.querySelectorAll('.rv').forEach(el => io.observe(el));
          });
        },

        init() {
          this.$watch('slide', v => this.enter(v));
          window.addEventListener('keydown', e => {
            if (!this.wrapped) return;
            if (e.key === 'ArrowRight') this.next();
            if (e.key === 'ArrowLeft') this.prev();
          });
          const m = location.pathname.match(/\/wrap\/(0x[a-fA-F0-9]{40})/);
          const addr = m ? m[1] : new URLSearchParams(location.search).get('address');
          if (addr) { this.address = addr; this.$nextTick(() => this.wrap()); }
        },

        get sym() { return this.data.metrics?.tokenSymbol || 'OKB'; },

        get scoreData() {
          const m = this.data.metrics;
          if (!m) return [];
          return [
            { label: 'DeFi', value: m.defiScore, hex: '#2B4BFF' },
            { label: 'Airdrop', value: m.airdropScore, hex: '#8B3DFF' },
            { label: 'Degen', value: m.degenScore, hex: '#FF2D8B' },
            { label: 'Whale', value: m.whaleometer, hex: '#C68A00' },
          ];
        },

        get pf() { return this.data.metrics?.portfolio || {}; },
        get bag() { return (this.pf.topHoldings || []).slice(0, 5); },

        get momentum() {
          const t = this.data.metrics?.trajectory;
          if (!t) return null;
          const icon = { heating: '🔥', cooling: '🧊', steady: '➡️', dormant: '💤' }[t.momentum] || '';
          return { ...t, icon };
        },
        get topCps() { return (this.data.metrics?.topCounterparties || []).slice(0, 3); },

        get signalChips() {
          const s = this.data.metrics?.signals;
          if (!s) return [];
          return Object.entries(s).filter(([, v]) => v).map(([k]) =>
            k.replace(/([A-Z])/g, ' $1').trim()
          );
        },

        get activity() {
          const b = this.data.metrics?.activityBreakdown;
          if (!b) return [];
          return [
            { label: 'Swap', value: b.swap },
            { label: 'Approve', value: b.approve },
            { label: 'Transfer', value: b.transfer },
            { label: 'Native', value: b.native },
            { label: 'Other', value: b.other },
          ];
        },

        get peakHourLabel() {
          const h = this.data.metrics?.peakHour;
          if (h === undefined || h === null) return '';
          const ampm = h >= 12 ? 'PM' : 'AM';
          return (h % 12 || 12) + ':00 ' + ampm;
        },

        shortAddr(a) { return (!a || a.length < 16) ? (a || '') : a.slice(0, 10) + '...' + a.slice(-6); },

        enter(v) {
          if (v === 2) {
            this.countUp('totalTx', this.data.metrics.totalTx);
            this.countUp('swaps', this.data.metrics.swapCount);
          }
        },

        countUp(key, target) {
          const start = performance.now(), dur = 900;
          this.disp[key] = 0;
          const step = now => {
            const t = Math.min(1, (now - start) / dur);
            this.disp[key] = Math.round((1 - Math.pow(1 - t, 3)) * target);
            if (t < 1) requestAnimationFrame(step);
          };
          requestAnimationFrame(step);
        },

        go(n) { this.slide = n; },
        prev() { if (this.slide > 0) this.slide--; },
        next() { if (this.slide < this.totalSlides - 1) this.slide++; },

        touchStart(e) { this.touchX = e.changedTouches[0].clientX; },
        touchEnd(e) {
          const dx = e.changedTouches[0].clientX - this.touchX;
          if (dx < -50) this.next();
          if (dx > 50) this.prev();
        },

        async wrap() {
          const addr = this.address.trim();
          if (!addr || !addr.startsWith('0x') || addr.length !== 42) {
            alert('Please enter a valid 0x wallet address (42 characters)');
            return;
          }
          this.loading = true;
          try {
            const res = await fetch('/api/txwrap', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ address: addr }),
            });
            if (!res.ok) { const err = await res.json(); throw new Error(err.error || 'Request failed'); }
            const json = await res.json();
            this.data = json.data;
            this.slide = 0;
            this.wrapped = true;
            this.loading = false;
          } catch (e) {
            this.loading = false;
            alert('Error: ' + e.message);
          }
        },

        loadSample() {
          this.data = {
            address: '0x69c236e021f5775b0d0328ded5eac708e3b869df',
            metrics: {
              totalTx: 847, tokenSymbol: 'OKB', balanceEth: '12.4821', balanceUsd: '624.10',
              gasBurnedEth: '3.2140', gasBurnedUsd: '160.70', swapCount: 213, defiScore: 78,
              activityBreakdown: { swap: 213, approve: 47, transfer: 89, native: 61, other: 90 },
              portfolio: {
                tokenCount: 7, totalValueUsd: 1841.22, stablecoinValueUsd: 614.43, nftCount: 4,
                topHoldings: [
                  { symbol: 'USDT', amount: '614.05', valueUsd: 614.43 },
                  { symbol: 'WOKB', amount: '9.2', valueUsd: 460.00 },
                  { symbol: 'XDOG', amount: '128400', valueUsd: 385.20 },
                  { symbol: 'USDC', amount: '210.11', valueUsd: 210.15 },
                  { symbol: 'PT', amount: '1520', valueUsd: 171.44 },
                ],
              },
              tokenActivity: { transferCount: 96, uniqueTokens: 11, inbound: 41, outbound: 55, topToken: 'USDT' },
              internalTxCount: 132, crossChain: { total: 9, deposits: 5, withdrawals: 4 },
              netWorthUsd: '2465.32',
              airdropScore: 82, degenScore: 91, diamondHandsDays: 14, whaleometer: 67,
              uniqueProtocols: 19, topFrenemy: '0x8f3a9c2b1d4e5f6a7b8c9d0e1f2a3b4c5d6e7f80',
              topFrenemyLabel: '0x8f3a…7f80', rarity: 'S-Tier',
              trajectory: { tx7d: 31, tx30d: 96, prev7d: 14, momentum: 'heating' },
              percentile: { standoutScore: 91, topPercent: 4, sampleSize: 512, basis: 'wallets profiled by TxWrap' },
              topCounterparties: [
                { address: '0x779ded0c9e1022225f8e0630b35a9b54be713736', label: 'USDT0', txCount: 41 },
                { address: '0xe538905cf8410324e03a5a23c1c177a474d59b2b', label: 'WOKB', txCount: 27 },
                { address: '0x8f3a9c2b1d4e5f6a7b8c9d0e1f2a3b4c5d6e7f80', label: '0x8f3a…7f80', txCount: 23 },
              ],
              signals: { nightOwl: true, likelyBot: false, approvalHeavy: true, highSwapActivity: true, diversifiedPortfolio: true, crossChainUser: true, nftCollector: true },
              peakHour: 2, activityStreak: 23, archetype: 'The 2AM Degen',
              sarcasticTitle: 'Serial Approver',
            },
            personality: {
              title: '🎰 The 2AM Degen',
              roast: 'You made 213 swaps and 61% were past midnight. Sleep is a protocol you never interacted with.',
              funFacts: [
                'You burned 3.21 OKB on gas — roughly 40 coffees you will never get back.',
                '19 protocols touched, maybe 3 remembered. Classic explorer energy.',
                'Peak trading hour: 2AM. We are not mad, just deeply concerned.',
              ],
              verdict: 'Certified degen. Mid-table of crypto, top-table of insomnia.',
            },
          };
          this.slide = 0;
          this.wrapped = true;
        },

        scrollToWrap() {
          const el = document.getElementById('wrap');
          if (el) el.scrollIntoView({ behavior: 'smooth', block: 'center' });
        },

        reset() { this.wrapped = false; this.slide = 0; this.address = ''; },

        async saveImage() {
          const el = document.getElementById('card');
          if (!el) return;
          try {
            const canvas = await html2canvas(el, {
              scale: 2, useCORS: true, logging: false,
              onclone: (doc) => {
                // html2canvas re-triggers CSS animations in the clone, capturing
                // reveal elements at their opacity:0 start frame. Freeze them.
                doc.querySelectorAll('.pop').forEach(n => {
                  n.style.opacity = '1';
                  n.style.transform = 'none';
                  n.style.animation = 'none';
                });
                doc.querySelectorAll('.marquee > span').forEach(n => { n.style.animation = 'none'; });
                // -webkit-text-stroke is unsupported by html2canvas; render solid.
                doc.querySelectorAll('.hollow').forEach(n => {
                  n.style.color = 'currentColor';
                  n.style.webkitTextStroke = '0';
                });
              },
            });
            const link = document.createElement('a');
            link.download = 'txwrap-' + Date.now() + '.png';
            link.href = canvas.toDataURL('image/png');
            link.click();
          } catch (e) { alert('Failed to generate image: ' + e.message); }
        },

        shareX() {
          const url = window.location.href;
          const text = '📊 Check out my wallet wrap! 🎰\n\n' + url + '\n\n#OKXAI #TxWrap';
          window.open('https://x.com/intent/tweet?text=' + encodeURIComponent(text), '_blank', 'width=600,height=400');
        },
      };
    }
  </script>
</body>
